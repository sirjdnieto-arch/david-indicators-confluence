# .github/workflows/scheduled_run.yml
name: Daily Confluence Snapshot

on:
  schedule:
    - cron: "30 15 * * 1-5"   # 15:30 UTC = NY close, Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily snapshot
        run: python scripts/daily_snapshot.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit snapshot artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet || git commit -m "📊 Daily snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: confluence-snapshot-${{ github.run_number }}
          path: snapshots/
          retention-days: 30
